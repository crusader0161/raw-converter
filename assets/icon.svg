<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="68%">
      <stop offset="0%"   stop-color="#1e1040"/>
      <stop offset="100%" stop-color="#080810"/>
    </radialGradient>
    <radialGradient id="lens" cx="38%" cy="34%" r="66%">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="55%"  stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#3b1680"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="url(#bg)"/>

  <!-- Outer decorative ring -->
  <circle cx="512" cy="512" r="432" fill="none" stroke="#3b1d8a" stroke-width="14"/>

  <!-- Main lens body -->
  <circle cx="512" cy="512" r="352" fill="url(#lens)"/>

  <!-- 6 aperture dividing lines: from inner-circle edge (r=132) to lens edge (r=352) -->
  <!-- Each line: x=512, y from 160 (top of lens, 512-352) to 380 (top of inner, 512-132) -->
  <!-- Rotated 60° steps around (512,512) -->
  <g stroke="#1a0836" stroke-width="18" stroke-linecap="butt" opacity="0.95">
    <line x1="512" y1="160" x2="512" y2="380" transform="rotate(0   512 512)"/>
    <line x1="512" y1="160" x2="512" y2="380" transform="rotate(60  512 512)"/>
    <line x1="512" y1="160" x2="512" y2="380" transform="rotate(120 512 512)"/>
    <line x1="512" y1="160" x2="512" y2="380" transform="rotate(180 512 512)"/>
    <line x1="512" y1="160" x2="512" y2="380" transform="rotate(240 512 512)"/>
    <line x1="512" y1="160" x2="512" y2="380" transform="rotate(300 512 512)"/>
  </g>

  <!-- Lens edge highlight -->
  <circle cx="512" cy="512" r="352" fill="none" stroke="#c084fc" stroke-width="5" opacity="0.3"/>

  <!-- Secondary ring -->
  <circle cx="512" cy="512" r="252" fill="none" stroke="#9333ea" stroke-width="3" opacity="0.22"/>

  <!-- Inner aperture opening -->
  <circle cx="512" cy="512" r="132" fill="#08080e"/>
  <circle cx="512" cy="512" r="124" fill="none" stroke="#7c3aed" stroke-width="5" opacity="0.55"/>

  <!-- Lens glint (top-left highlight) -->
  <ellipse cx="452" cy="442" rx="34" ry="21" fill="white" opacity="0.18"
           transform="rotate(-42 452 442)"/>
  <ellipse cx="434" cy="424" rx="13" ry="8"  fill="white" opacity="0.32"
           transform="rotate(-42 434 424)"/>
</svg>
